<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Canteen - Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <h1>Smart Canteen</h1>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="orders.html">Orders</a></li>
                <li><a href="admin.html">Admin</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="admin">
            <h2>Admin Panel</h2>
            <form id="add-item-form">
                <input type="text" id="item-name" placeholder="Item Name" required>
                <input type="text" id="item-desc" placeholder="Description" required>
                <input type="number" step="00.00" id="item-price" placeholder="Price" required>
                <input type="number" id="item-stock" placeholder="Stock" required>
                <button type="submit" class="btn">Add Item</button>
            </form>
            <h3>Menu Items</h3>
            <div id="admin-menu"></div>
            <h3>All Orders</h3>
            <div id="admin-orders"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Smart Canteen. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
